# Benchmark configuration for the WOR-180 local LLM testbench.
# Load with BenchConfig.from_toml("config/bench.toml").
# expand_matrix() produces the full Cartesian product of models × tiers × contexts × concurrency.
# Disabled backends and their models are excluded from the matrix.
#
# Quick-start (Ollama already running, all models pre-pulled):
#   python scripts/bench/run_bench.py --generate-fixtures   # one-time: build 50k-token fixture
#   python scripts/bench/run_bench.py --tier speed          # fast sanity check (~10 min, 5 models)
#   python scripts/bench/run_bench.py                       # full matrix — all tiers, all models
#   python scripts/bench/run_bench.py --browse              # explore results in Datasette
#
# To run a single model or backend:
#   python scripts/bench/run_bench.py --model qwen3-coder:30b --tier speed
#   python scripts/bench/run_bench.py --backend local_vllm --tier prefill_shared
#
# Enable vLLM: set local_vllm.enabled = true, start server (see backend comment below),
# then re-run. vLLM model ids must match --model arg used when starting the server.

[matrix]
# Non-boundary context windows (all tiers except boundary).
#   16384  = realistic coding context; new floor (4K dropped — watcher sessions never start below 10K)
#   32768  = 32K — common production window
#   65536  = 64K — confirmed safe on RTX 5090 + qwen3-coder:30b (spike WOR-76)
#   98304  = 96K — calibration point between 64K and 128K; characterises devstral cliff + qwen3.6:35b-a3b VRAM squeeze
#   131072 = 128K — all models nominally support; larger models likely OOM-skip beyond here
#   196608 = 192K — floor models (qwen3.5:9b) have headroom; larger models skipped_oom
#   262144 = 256K — native limit of qwen3.5:9b; only floor models expected to reach this
# NOTE: prefill_shared/unshared tiers use a 50K-token fixture regardless of context_size.
# At 196K+ the fixture fills only ~20% of the allocated KV buffer — prefill numbers at those
# sizes reflect VRAM pressure on an undersized fixture, not genuine long-context prefill.
# Per-tier context_sizes override is a future improvement; interpret prefill results at 196K+
# with this in mind.
context_sizes = [16384, 32768, 65536, 98304, 131072, 196608, 262144]
# Boundary tier — sole OOM cliff probe beyond the standard tier ceiling.
# 96K/128K dropped: now covered by standard tier with OOM-skip safety net.
# 320K: only qwen3.5:9b-q4_K_M has any realistic chance (~31 GB est.); all others skipped_oom.
boundary_context_sizes = [327680]
# Single concurrency only. Speed-tier data showed 98-105% efficiency at concurrency=2
# across all 7 models — Ollama serialises requests on a single GPU as expected.
# No differential signal; removing concurrency=2 halves the matrix with no data loss.
concurrency_levels = [1]
# Real (non-warmup) runs per probe point. 3 gives statistical confidence.
repeats = 3

# ── Backends ──────────────────────────────────────────────────────────────────
# Driver selection: backend id containing "vllm" → VllmDriver; otherwise → OllamaDriver.
# OllamaDriver calls {base_url}/api/chat — do NOT include /v1 in the Ollama base_url.

[[backends]]
# Primary: Ollama. Auto-managed — runner starts, pulls, and flushes models as needed.
id = "local_qwen"
enabled = true
base_url = "http://localhost:11434"

[[backends]]
# vLLM — NOT auto-managed. Start manually before enabling, one model at a time:
#
#   # Dense models (one at a time — they fill most of the 32 GB):
#   python -m vllm.entrypoints.openai.api_server \
#     --model Qwen/Qwen3-14B --port 8000 --max-model-len 65536 \
#     --gpu-memory-utilization 0.90 --enable-prefix-caching
#
#   # MoE models (lower VRAM active; higher max-model-len feasible):
#   python -m vllm.entrypoints.openai.api_server \
#     --model Qwen/Qwen3.6-35B-A3B --port 8000 --max-model-len 131072 \
#     --gpu-memory-utilization 0.90 --enable-prefix-caching
#
# The key benefit to measure: vLLM APC on prefill_shared tier vs Ollama.
# Run with --tier prefill_shared after enabling to isolate that comparison.
id = "local_vllm"
enabled = false
base_url = "http://localhost:8000"

# ── Ollama models (enabled) ────────────────────────────────────────────────────
# Model IDs must exactly match Ollama's name format — verify with: ollama list
# Models confirmed present on this machine (ollama list, 2026-04-26; expanded 2026-04-26).

[[models]]
# 23 GB | MoE 35B total / ~3B active — low KV pressure despite large param count.
# Candidate from WOR-180: expected to match or beat dense 30B on coding quality.
id = "qwen3.6:35b-a3b"
backend_id = "local_qwen"

[[models]]
# 19 GB | MoE 30B coder / 3.3B active — current production model (spike WOR-76 baseline).
# 256K native context; same MoE efficiency profile as qwen3.6:35b-a3b.
id = "qwen3-coder:30b"
backend_id = "local_qwen"

[[models]]
# 19 GB | Dense 32B coder Q4_K_M — REFERENCE ONLY: previous-generation baseline.
# Severe throughput cliff at 32K+ context (VRAM pressure); not a production candidate.
# Kept to quantify Qwen3.6 MoE improvement over prior dense 32B generation.
id = "qwen2.5-coder:32b-instruct-q4_K_M"
backend_id = "local_qwen"

[[models]]
# 17 GB | Dense 27B — Gemma 3 cross-vendor comparison at the 27B size tier.
id = "gemma3:27b"
backend_id = "local_qwen"

[[models]]
# 6.6 GB | Dense 9B Q4_K_M — floor model; 256K context, multimodal. Fast cheap worker baseline.
id = "qwen3.5:9b-q4_K_M"
backend_id = "local_qwen"

[[models]]
# 11 GB | Dense 9B Q8_0 — higher quality quant; compare vs qwen3.5:9b-q4_K_M for quality/speed tradeoff.
id = "qwen3.5:9b-q8_0"
backend_id = "local_qwen"

[[models]]
# 14 GB | MoE 24B coding agent — Mistral Devstral, purpose-built for agentic coding, 128K context.
id = "devstral:24b"
backend_id = "local_qwen"


# ── vLLM models (disabled via local_vllm backend) ─────────────────────────────
# vLLM model ids are HuggingFace repo ids. The model arg must match --model used
# when starting the server. Enable local_vllm backend and run one model at a time.
# Verify HuggingFace repo names at https://huggingface.co/Qwen before starting.

[[models]]
# HF: Qwen/Qwen3-14B
id = "Qwen/Qwen3-14B"
backend_id = "local_vllm"

[[models]]
# HF: verify exact repo name — may be Qwen/Qwen3.6-35B-A3B or similar
id = "Qwen/Qwen3.6-35B-A3B"
backend_id = "local_vllm"

[[models]]
# HF: verify exact repo name — may be Qwen/Qwen3-Coder-30B-Instruct or similar
id = "Qwen/Qwen3-Coder-30B-Instruct"
backend_id = "local_vllm"

[[models]]
# HF: Qwen/Qwen2.5-Coder-32B-Instruct (use unquantized; apply --quantization awq if needed)
id = "Qwen/Qwen2.5-Coder-32B-Instruct"
backend_id = "local_vllm"

# ── Tiers ─────────────────────────────────────────────────────────────────────
# All five tiers. Use --tier <name> for a single-tier run.
# prefill_shared requires the 50k fixture: run --generate-fixtures once first.

[[tiers]]
# Raw generation speed: short prompt, ~256 tokens out. No fixture needed.
name = "speed"

[[tiers]]
# Real coding task with pytest/ruff/mypy quality evaluation. Temperature=0.
name = "coding"

[[tiers]]
# TTFT with shared repo-prefix fixture. Measures vLLM APC reuse vs Ollama.
# First request per model = cache warm; subsequent = prefix_warm.
# context_sizes capped at 131072: fixture fills ~75% of context at each size.
# Above 131072 the fixture becomes an increasingly small fraction of KV buffer,
# making TTFT numbers reflect VRAM pressure rather than prefill performance.
name = "prefill_shared"
context_sizes = [16384, 32768, 65536, 98304, 131072]

[[tiers]]
# TTFT with same-length randomised content. APC null baseline (cold prefill every run).
# Same context_sizes cap as prefill_shared — content scales to 75% fill at each size.
name = "prefill_unshared"
context_sizes = [16384, 32768, 65536, 98304, 131072]

[[tiers]]
# Long-context OOM cliff probe at boundary_context_sizes. OOM is recorded, not fatal.
name = "boundary"
